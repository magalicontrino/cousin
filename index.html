<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0e0e0e">
<title>COUSIN — Réseau d'aide · Bruxelles</title>
<style>
  :root{
    --gold:#f3c53f; --gold-d:#e0ad1c;
    --iris:#141414; --iris-d:#141414; --ink:#141414; --muted:#6b7280; --faint:#9aa1ad;
    --bg:#0e0e0e; --card:#ffffff; --line:#ededf0; --soft:#f4f4f6;
    --danger:#141414; --star:#f3c53f;
    --oncard-muted:#6b7280; --ondark:#e9e9ec; --ondark-muted:#9a9a9f;
    --shadow:0 1px 2px rgba(30,32,60,.06), 0 4px 16px rgba(30,32,60,.05);
    --shadow-lg:0 8px 30px rgba(30,32,60,.12);
    color-scheme:light;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.45; padding-bottom:96px;
  }
  a{color:inherit}
  .wrap{max-width:720px; margin:0 auto}

  /* Header */
  header{
    position:sticky; top:0; z-index:20;
    background:var(--bg);
    color:#fff; padding:calc(env(safe-area-inset-top) + 14px) 16px 16px;
  }
  .hrow{display:flex; align-items:center; gap:12px; max-width:720px; margin:0 auto}
  .back{
    flex:0 0 auto; width:38px; height:38px; border-radius:11px; border:0; cursor:pointer;
    background:#1c1c1f; color:#fff; font-size:20px; display:none; align-items:center; justify-content:center;
  }
  .back svg{width:20px; height:20px}
  .htitle{flex:1; min-width:0}
  .htitle h1{margin:0; font-size:19px; font-weight:800; letter-spacing:.4px; text-transform:uppercase; color:#fff; display:flex; align-items:center; gap:9px}
  .htitle h1.logo{
    font-size:26px; font-weight:900; font-style:italic; letter-spacing:.5px; color:var(--gold);
    text-transform:uppercase; position:relative; display:inline-block;
  }
  .htitle h1.logo::after{
    content:""; position:absolute; left:1px; right:5px; bottom:-5px; height:3px;
    background:var(--gold); border-radius:3px; transform:skewY(-4deg);
  }
  .logo-img{height:40px; width:auto; display:none; margin:2px 0}
  .htitle .sub{margin:6px 0 0; font-size:12.5px; color:var(--ondark-muted); font-weight:500}
  .search{display:flex; align-items:center; background:#fff; border-radius:12px; padding:0 12px; margin:14px auto 0; max-width:720px}
  .search input{border:0; outline:0; padding:12px 8px; font-size:16px; width:100%; background:transparent; color:var(--ink)}
  .search svg{flex:0 0 auto; opacity:.45}

  main{padding:16px 14px 0}

  /* Tiles */
  .tiles{display:grid; grid-template-columns:repeat(2,1fr); gap:12px}
  @media(min-width:560px){.tiles{grid-template-columns:repeat(3,1fr)}}
  .tile{
    position:relative; background:var(--card); border:1px solid var(--line); border-radius:18px;
    padding:16px 14px 14px; cursor:pointer; text-align:left; box-shadow:var(--shadow);
    transition:transform .12s ease, box-shadow .12s ease; overflow:hidden;
  }
  .tile:active{transform:scale(.975)}
  .tile{padding:18px 16px 16px}
  .tile .ic{
    width:64px; height:64px; border-radius:18px; display:flex; align-items:center; justify-content:center;
    margin-bottom:14px;
  }
  .tile h3{margin:0; font-size:17px; font-weight:800; letter-spacing:-.2px}
  .tile .n{margin-top:4px; font-size:12.5px; color:var(--muted); font-weight:700}
  .tile .bar{width:6px}
  .tile .bar{position:absolute; left:0; top:0; bottom:0; width:5px}

  .section-note{
    font-size:12.5px; color:var(--ondark-muted); background:#161616; border:1px solid #262626;
    border-radius:14px; padding:12px 14px; margin-top:18px; line-height:1.55;
  }
  .section-note b{color:var(--gold)}
  .section-note svg{color:var(--gold)}

  /* Navigation en pavés (domaines) */
  .domnav{display:flex; gap:8px; overflow-x:auto; padding:2px 0 14px; -webkit-overflow-scrolling:touch; scrollbar-width:none}
  .domnav::-webkit-scrollbar{display:none}
  .pave{
    flex:0 0 auto; width:80px; padding:13px 4px; border-radius:17px; background:#1a1a1c; border:1px solid #29292d;
    color:var(--ondark); display:flex; flex-direction:column; align-items:center; gap:7px; cursor:pointer; text-align:center;
  }
  .pave:active{transform:scale(.96)}
  .pave svg{width:29px; height:29px}
  .pave span{font-size:11px; font-weight:750; line-height:1.1}
  .pave.active{background:var(--gold); border-color:var(--gold); color:#141414}

  /* Commune chips */
  .chips{display:flex; gap:8px; overflow-x:auto; padding:2px 0 10px; -webkit-overflow-scrolling:touch; scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{
    flex:0 0 auto; border:1px solid var(--line); background:var(--card); color:var(--muted);
    padding:7px 13px; border-radius:20px; font-size:13px; font-weight:650; cursor:pointer; white-space:nowrap;
  }
  .chip.active{background:var(--gold); border-color:var(--gold); color:#141414}
  .count{font-size:12px; color:var(--ondark-muted); font-weight:700; text-transform:uppercase; letter-spacing:.5px; padding:2px 2px 12px}

  /* Cards */
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow);
    margin-bottom:12px; overflow:hidden; position:relative;
  }
  .star{
    position:absolute; top:12px; right:12px; z-index:2; background:none; border:0; cursor:pointer;
    font-size:20px; line-height:1; padding:4px; color:#d3d7e2;
  }
  .star.on{color:var(--star)}
  .card-top{padding:15px 46px 12px 15px; cursor:pointer}
  .tags{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:9px}
  .tag{font-size:10.5px; font-weight:750; text-transform:uppercase; letter-spacing:.4px; padding:3px 8px; border-radius:7px}
  .tag.dom{color:#141414}
  .tag.com{background:var(--soft); color:var(--iris-d)}
  .card h2{margin:0; font-size:16.5px; font-weight:750; letter-spacing:-.2px}
  .card .desc{margin:6px 0 0; font-size:14px; color:var(--muted)}
  .card .public{margin:8px 0 0; font-size:13px}
  .card .public b{color:var(--iris-d)}
  .detail{max-height:0; overflow:hidden; transition:max-height .3s ease; background:#fbfbfe}
  .card.open .detail{max-height:900px}
  .detail-inner{padding:2px 15px 14px; border-top:1px solid var(--line)}
  .row{display:flex; align-items:flex-start; gap:10px; padding:10px 0; font-size:14px; border-bottom:1px solid var(--line)}
  .row:last-child{border-bottom:0}
  .row .ico{flex:0 0 22px; text-align:center; opacity:.75; padding-top:1px}
  .row a{color:var(--iris-d); text-decoration:underline; font-weight:650; word-break:break-word}
  /* Icônes vectorielles */
  .ic svg{width:40px; height:40px}
  .row .ico svg{width:20px; height:20px; display:block; margin:0 auto}
  .tag svg{width:12px; height:12px; vertical-align:-2px; margin-right:4px}
  .mini svg{width:16px; height:16px; vertical-align:-3px; margin-right:5px}
  #hEmoji{display:inline-flex; align-items:center}
  #hEmoji svg{width:26px; height:26px}
  .actions{display:flex; flex-wrap:wrap; gap:8px; padding:12px 15px 4px}
  .btn{
    flex:1 1 40%; text-align:center; padding:11px; border-radius:11px; font-size:14px; font-weight:750;
    text-decoration:none; border:0; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .btn.call{background:var(--gold); color:#141414}
  .btn.map{background:var(--soft); color:var(--ink)}
  .btn.mail{background:var(--soft); color:var(--ink)}
  .btn.web{background:#fff; color:var(--ink); box-shadow:inset 0 0 0 1.5px var(--line)}
  .btn svg{width:16px; height:16px; vertical-align:-3px; margin-right:5px}
  .mini{display:flex; gap:16px; padding:2px 15px 13px}
  .mini button{background:none; border:0; color:var(--muted); font-size:13px; font-weight:650; cursor:pointer; padding:4px 0}
  .mini button.del{color:var(--danger)}

  /* Méthode card */
  .method .card-top{cursor:pointer}
  .method .body{white-space:pre-line; font-size:14px; color:var(--ink); padding:2px 15px 6px}
  .method .body.collapsed{max-height:0; overflow:hidden; padding-top:0; padding-bottom:0}

  .empty{text-align:center; color:var(--ondark-muted); padding:46px 20px; font-size:15px; line-height:1.6}

  /* FAB + tools */
  .fab{
    position:fixed; right:18px; bottom:calc(env(safe-area-inset-bottom) + 18px); z-index:30;
    width:58px; height:58px; border-radius:50%; background:var(--gold); color:#141414; border:0;
    font-size:30px; line-height:1; box-shadow:0 6px 20px rgba(243,197,63,.4); cursor:pointer;
  }
  .tools{position:fixed; left:16px; bottom:calc(env(safe-area-inset-bottom) + 22px); z-index:30; display:flex; gap:9px}
  .tools button{
    background:#fff; border:1px solid var(--line); border-radius:20px; padding:8px 13px; font-size:12px;
    font-weight:650; color:var(--muted); box-shadow:var(--shadow); cursor:pointer;
  }

  /* Modal */
  .modal-bg{position:fixed; inset:0; background:rgba(20,22,45,.5); z-index:40; display:none; align-items:flex-end; justify-content:center; backdrop-filter:blur(2px)}
  .modal-bg.show{display:flex}
  .modal{
    background:#fff; width:100%; max-width:600px; border-radius:22px 22px 0 0;
    padding:20px 18px calc(env(safe-area-inset-bottom) + 20px); max-height:92vh; overflow-y:auto; animation:up .25s ease;
  }
  @keyframes up{from{transform:translateY(40px);opacity:.5}to{transform:translateY(0);opacity:1}}
  .modal h3{margin:2px 0 4px; font-size:18px; font-weight:800}
  .modal .hint{font-size:12.5px; color:var(--muted); margin:0 0 8px}
  label{display:block; font-size:12.5px; font-weight:700; color:var(--muted); margin:13px 0 5px}
  input,textarea,select{
    width:100%; padding:12px; font-size:16px; border:1px solid var(--line); border-radius:11px;
    font-family:inherit; background:#fff; color:var(--ink);
  }
  textarea{resize:vertical; min-height:66px}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:10px}
  .modal-actions{display:flex; gap:10px; margin-top:22px; position:sticky; bottom:0; background:#fff; padding-top:8px}
  .modal-actions button{flex:1; padding:14px; border-radius:12px; font-size:15px; font-weight:800; border:0; cursor:pointer}
  .save{background:var(--gold); color:#141414}
  .cancel{background:#f1f2f6; color:var(--ink)}
  .only-method{display:none}
</style>
</head>

<main><div class="wrap" id="view"></div></main>

<div class="tools">
  <button onclick="exportData()">⬇︎ Sauvegarder</button>
  <button onclick="document.getElementById('importFile').click()">⬆︎ Importer</button>
  <input type="file" id="importFile" accept="application/json" style="display:none" onchange="importData(event)">
</div>
<button class="fab" onclick="openForm()">+</button>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="modalTitle">Nouvelle ressource</h3>
    <input type="hidden" id="f-id">
    <label>Nom *</label>
    <input id="f-nom" placeholder="Ex. CPAS d'Ixelles">
    <div class="grid2">
      <div><label>Domaine</label><select id="f-dom"></select></div>
      <div><label>Commune</label><select id="f-com"></select></div>
    </div>
    <label id="lab-desc">Ce qu'ils proposent</label>
    <textarea id="f-desc" placeholder="Ex. Aide sociale, revenu d'intégration, guidance…"></textarea>

    <div class="not-method">
      <label>Public concerné</label>
      <input id="f-public" placeholder="Ex. Habitants de la commune, sans-papiers, jeunes…">
      <label>Référent (nom + ligne directe)</label>
      <input id="f-referent" placeholder="Ex. M. Peeters – 02 123 45 67">
      <div class="grid2">
        <div><label>Téléphone</label><input id="f-tel" type="tel" placeholder="02 123 45 67"></div>

      </div>
      <label>Email</label>
      <input id="f-mail" type="email" placeholder="contact@exemple.be">
      <label>Adresse</label>
      <input id="f-adr" placeholder="Rue… 00, 1000 Bruxelles">
      <label>Horaires</label>
      <input id="f-horaires" placeholder="Lun–Ven 9h–12h / 13h–16h">
    </div>

    <label id="lab-notes">Notes personnelles</label>
    <textarea id="f-notes" placeholder="Astuces, délais, pièces à fournir, procédure…"></textarea>

    <div class="modal-actions">
      <button class="cancel" onclick="closeForm()">Annuler</button>
      <button class="save" onclick="savePartner()">Enregistrer</button>
    </div>

<script>
/* ---------- Référentiels ---------- */
/* Identité COUSIN : fond noir, accent or, icônes pleines « bold ».
   Accent commun à tous les domaines ; on pourra en donner un par domaine plus tard. */
const GOLD = "#f3c53f", GOLD_SOFT = "#fbf0c4";
const DOMAINES = [
  {key:"medical",     label:"Médical",            short:"Médical",   ic:"medical",     color:GOLD, soft:GOLD_SOFT, byCommune:true},
  {key:"social",      label:"Social",             short:"Social",    ic:"social",      color:GOLD, soft:GOLD_SOFT},
  {key:"educatif",    label:"Éducatif",           short:"Éducatif",  ic:"educatif",    color:GOLD, soft:GOLD_SOFT},
  {key:"juridique",   label:"Juridique",          short:"Juridique", ic:"juridique",   color:GOLD, soft:GOLD_SOFT},
  {key:"etrangers",   label:"Droit des étrangers",short:"Étrangers", ic:"globe",       color:GOLD, soft:GOLD_SOFT},
  {key:"santementale",label:"Santé mentale",      short:"Santé",     ic:"mind",        color:GOLD, soft:GOLD_SOFT},
  {key:"logement",    label:"Logement",           short:"Logement",  ic:"home",        color:GOLD, soft:GOLD_SOFT},
  {key:"urgences",    label:"Urgences",           short:"Urgences",  ic:"alert",       color:GOLD, soft:GOLD_SOFT},
  {key:"methodes",    label:"Méthodes de travail",short:"Méthodes",  ic:"clipboard",   color:GOLD, soft:GOLD_SOFT, method:true}
];
const DOM = Object.fromEntries(DOMAINES.map(d=>[d.key,d]));

/* Jeu d'icônes maison, style « bold » plein (currentColor). Le globe reste au trait. */
const ICONS = {
  medical:  '<rect x="9.3" y="4" width="5.4" height="16" rx="2.4"/><rect x="4" y="9.3" width="16" height="5.4" rx="2.4"/>',

/* Version du catalogue fourni : à incrémenter à chaque mise à jour des données de départ.
   La fusion (load) rafraîchit le catalogue tout en gardant les favoris et les fiches ajoutées par l'utilisateur. */
const SEED_VERSION = 3;
function slug(t){return (t||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,64);}
(function assignSids(){
  const seen={};
  SAMPLE.forEach(p=>{
    const base='seed-'+slug(p.domaine+'-'+p.nom); let s=base, n=1;
    while(seen[s]) s=base+'-'+(++n);
    seen[s]=1; p.sid=s;
  });
})();

/* ---------- État ---------- */
const KEY = "reseau_aide_bxl";
let data = load();
let view = "home";          // "home" ou clé de domaine
let query = "";
let activeCommune = "Toutes";

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function normalize(p){
  const id=p.id||uid();
  return {id, sid:p.sid||('user-'+id), fav:!!p.fav,
    domaine:p.domaine&&DOM[p.domaine]?p.domaine:"social",
    nom:p.nom||"", commune:p.commune||"", desc:p.desc||"", public:p.public||"", referent:p.referent||"",
    tel:p.tel||"", mail:p.mail||"", site:p.site||"", adr:p.adr||"", horaires:p.horaires||"", notes:p.notes||""};
}
function load(){
  let stored=null;
  try{stored=JSON.parse(localStorage.getItem(KEY));}catch(e){}
  if(stored && stored.v===SEED_VERSION && Array.isArray(stored.items)){
    return stored.items.map(normalize);
  }
  // Nouvelle version du catalogue (ou premier lancement) : on ré-injecte les données
  // de départ à jour, tout en préservant les favoris et les fiches ajoutées par l'utilisateur.
  const favSids=new Set(); const userItems=[];
  if(stored && Array.isArray(stored.items)){
    stored.items.map(normalize).forEach(np=>{
      if(np.fav) favSids.add(np.sid);
      if(np.sid.indexOf('user-')===0) userItems.push(np);
    });
  }
  const merged = SAMPLE.map(p=>normalize({...p, fav:favSids.has(p.sid)})).concat(userItems);
  persist(merged);
  return merged;
}
function persist(arr){localStorage.setItem(KEY, JSON.stringify({v:SEED_VERSION, items:arr||data}));}
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function urlHref(u){return /^https?:\/\//i.test(u)?u:'https://'+u}
function countDom(k){return data.filter(p=>p.domaine===k).length}

/* ---------- Navigation ---------- */
function goHome(){view="home"; activeCommune="Toutes"; render()}
function openDomaine(k){view=k; activeCommune="Toutes"; document.getElementById('search').value=""; query=""; render()}

function updateHeader(){
  const back=document.getElementById('backBtn');
  const h1=document.getElementById('hTitle');
  const em=document.getElementById('hEmoji');
  const logoImg=document.getElementById('logoImg');
  if(view==="home"){
    back.style.display="none";
    logoImg.style.display="block"; h1.style.display="none"; em.innerHTML="";
    document.getElementById('hSub').textContent="Réseau d'aide aux personnes · Bruxelles";
  }else{
    const dm=DOM[view]; back.style.display="flex"; back.innerHTML=icon('chevron');
    logoImg.style.display="none"; h1.style.display="flex"; em.style.display="inline-flex"; em.innerHTML=icon(dm.ic);
    document.getElementById('hName').textContent=dm.label;
    document.getElementById('hSub').textContent = dm.byCommune?"Par commune de Bruxelles":(dm.method?"Repères pour l'équipe":"Ressources du réseau");
  }
}

/* ---------- Rendu ---------- */
function render(){
  updateHeader();
  const el=document.getElementById('view');
  const q=query.trim().toLowerCase();

  // Recherche globale (depuis l'accueil)
  if(view==="home" && q){
    el.innerHTML = cardsHTML(match(data,q)) || emptyHTML();
    return;
  }
  if(view==="home"){ el.innerHTML = homeHTML(); return; }

  // Vue domaine
  const dm=DOM[view];
  let items=data.filter(p=>p.domaine===view);
  if(q) items=match(items,q);

  let html=domNavHTML(view);
  if(dm.byCommune){
    const communes=["Toutes",...COMMUNES.filter(c=>items.some(p=>p.commune===c))];
    html+=`<div class="chips">`+communes.map(c=>
      `<div class="chip ${c===activeCommune?'active':''}" onclick="setCommune('${c.replace(/'/g,"\\'")}')">${esc(c)}</div>`).join('')+`</div>`;
    if(activeCommune!=="Toutes") items=items.filter(p=>p.commune===activeCommune);
  }
  items.sort((a,b)=>(b.fav-a.fav)||a.nom.localeCompare(b.nom,'fr'));
  html+=`<div class="count">${items.length} ${items.length>1?'ressources':'ressource'}</div>`;
  html+= cardsHTML(items) || emptyHTML();
  el.innerHTML=html;
}
function setCommune(c){activeCommune=c; render()}

function domNavHTML(active){
  return `<div class="domnav">`+DOMAINES.map(dm=>
    `<button class="pave ${dm.key===active?'active':''}" onclick="openDomaine('${dm.key}')">${icon(dm.ic)}<span>${esc(dm.short||dm.label)}</span></button>`
  ).join('')+`</div>`;
}

function match(list,q){
  return list.filter(p=>[p.nom,p.desc,p.public,p.commune,p.notes,p.adr,p.referent,DOM[p.domaine].label]
    .join(' ').toLowerCase().includes(q));
}

function homeHTML(){
  const tiles=DOMAINES.map(dm=>`
    <button class="tile" onclick="openDomaine('${dm.key}')">
      <span class="bar" style="background:${dm.color}"></span>
      <span class="ic" style="background:${dm.soft}">${icon(dm.ic)}</span>
      <h3>${dm.label}</h3>
      <div class="n">${countDom(dm.key)} ${countDom(dm.key)>1?'entrées':'entrée'}</div>
    </button>`).join('');
  return `<div class="tiles">${tiles}</div>
    <div class="section-note">${icon('bulb','width="15" height="15" style="vertical-align:-3px;margin-right:4px"')}<b>Astuce :</b> touchez un domaine pour voir les ressources. La section <b>Médical</b> est classée par commune. Les données sont enregistrées <b>sur cet appareil</b> — pensez à « Sauvegarder » régulièrement. Certaines coordonnées sont à confirmer avant usage.</div>`;
}

function cardsHTML(items){
  if(!items.length) return "";
  items=items.slice().sort((a,b)=>(b.fav-a.fav)||a.nom.localeCompare(b.nom,'fr'));
  return items.map(p=> DOM[p.domaine].method ? methodCard(p) : contactCard(p)).join('');
}

function domTag(p){
  const dm=DOM[p.domaine];
  return `<span class="tag dom" style="background:${dm.color}">${icon(dm.ic)}${esc(dm.label)}</span>`;
}

function contactCard(p){
  const telClean=(p.tel||'').replace(/\s/g,'');
  const rows=[];
  if(p.referent) rows.push(`<div class="row"><span class="ico">${icon('user')}</span><span>${esc(p.referent)}</span></div>`);
  if(p.tel) rows.push(`<div class="row"><span class="ico">${icon('phone')}</span><a href="tel:${esc(telClean)}">${esc(p.tel)}</a></div>`);
  if(p.horaires) rows.push(`<div class="row"><span class="ico">${icon('clock')}</span><span>${esc(p.horaires)}</span></div>`);
  if(p.mail) rows.push(`<div class="row"><span class="ico">${icon('mail')}</span><a href="mailto:${esc(p.mail)}">${esc(p.mail)}</a></div>`);
  if(p.site) rows.push(`<div class="row"><span class="ico">${icon('globe')}</span><a href="${esc(urlHref(p.site))}" target="_blank" rel="noopener">${esc(p.site)}</a></div>`);
  if(p.adr) rows.push(`<div class="row"><span class="ico">${icon('pin')}</span><span>${esc(p.adr)}</span></div>`);
  if(p.notes) rows.push(`<div class="row"><span class="ico">${icon('note')}</span><span>${esc(p.notes)}</span></div>`);

  const act=[];
  if(p.tel) act.push(`<a class="btn call" href="tel:${esc(telClean)}">${icon('phone')}Appeler</a>`);
  if(p.adr) act.push(`<a class="btn map" href="https://maps.google.com/?q=${encodeURIComponent(p.adr)}" target="_blank" rel="noopener">${icon('pin')}Itinéraire</a>`);
  if(p.mail) act.push(`<a class="btn mail" href="mailto:${esc(p.mail)}">${icon('mail')}Email</a>`);
  if(p.site) act.push(`<a class="btn web" href="${esc(urlHref(p.site))}" target="_blank" rel="noopener">${icon('globe')}Site web</a>`);

  const comTag = (p.commune && p.commune!=="Régional / Toutes communes") ? `<span class="tag com">${icon('pin')}${esc(p.commune)}</span>` : "";
  return `<div class="card" id="c-${p.id}">
    <button class="star ${p.fav?'on':''}" onclick="toggleFav(event,'${p.id}')">${p.fav?'★':'☆'}</button>
    <div class="card-top" onclick="toggle('${p.id}')">
      <div class="tags">${domTag(p)}${comTag}</div>
      <h2>${esc(p.nom)}</h2>
      ${p.desc?`<p class="desc">${esc(p.desc)}</p>`:''}
      ${p.public?`<p class="public"><b>Public :</b> ${esc(p.public)}</p>`:''}
    </div>
    <div class="detail"><div class="detail-inner">
      ${rows.join('')||'<div class="row" style="color:var(--muted)">Coordonnées à compléter</div>'}
      ${act.length?`<div class="actions">${act.join('')}</div>`:''}
      <div class="mini">
        <button onclick="openForm('${p.id}')">${icon('pencil')}Modifier</button>
        <button class="del" onclick="delPartner('${p.id}')">${icon('trash')}Supprimer</button>
      </div>
    </div></div>
  </div>`;
}

function methodCard(p){
  return `<div class="card method" id="c-${p.id}">
    <button class="star ${p.fav?'on':''}" onclick="toggleFav(event,'${p.id}')">${p.fav?'★':'☆'}</button>
    <div class="card-top" onclick="toggle('${p.id}')">
      <div class="tags">${domTag(p)}</div>
      <h2>${esc(p.nom)}</h2>
      ${p.desc?`<p class="desc">${esc(p.desc)}</p>`:''}
    </div>
    <div class="detail"><div class="detail-inner">
      ${p.notes?`<div class="body">${esc(p.notes)}</div>`:'<div class="body" style="color:var(--muted)">Contenu à compléter</div>'}
      <div class="mini">
        <button onclick="openForm('${p.id}')">${icon('pencil')}Modifier</button>
        <button class="del" onclick="delPartner('${p.id}')">${icon('trash')}Supprimer</button>
      </div>
    </div></div>
  </div>`;
}

function emptyHTML(){
  return `<div class="empty">Rien ici pour l'instant.<br>Touchez « + » pour ajouter une ressource.</div>`;
}

function toggle(id){document.getElementById('c-'+id).classList.toggle('open')}
function toggleFav(ev,id){ev.stopPropagation(); const p=data.find(x=>x.id===id); p.fav=!p.fav; persist(); render();}

/* ---------- Formulaire ---------- */
function fillSelects(){
  document.getElementById('f-dom').innerHTML = DOMAINES.map(dm=>`<option value="${dm.key}">${dm.emoji} ${esc(dm.label)}</option>`).join('');
  document.getElementById('f-com').innerHTML = COMMUNES.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('');
}
function syncFormMode(){
  const isM = document.getElementById('f-dom').value==="methodes";
  document.querySelectorAll('.not-method').forEach(e=>e.style.display=isM?'none':'');
  document.getElementById('lab-desc').textContent = isM?"Résumé / à quoi ça sert":"Ce qu'ils proposent";
  document.getElementById('lab-notes').textContent = isM?"Contenu de la méthode (étapes)":"Notes personnelles";
}
function openForm(id){
  fillSelects();
  const p=id?data.find(x=>x.id===id):null;
  document.getElementById('modalTitle').textContent = p?'Modifier':'Nouvelle ressource';
  const g=f=>document.getElementById(f);
  g('f-id').value=p?p.id:'';
  g('f-nom').value=p?p.nom:'';
  g('f-dom').value = p?p.domaine : (view!=="home"?view:"social");
  g('f-com').value = p?(p.commune||COMMUNES[0]) : COMMUNES[0];
  g('f-desc').value=p?p.desc:''; g('f-public').value=p?p.public:''; g('f-referent').value=p?p.referent:'';
  g('f-tel').value=p?p.tel:''; g('f-mail').value=p?p.mail:''; g('f-site').value=p?p.site:'';
  g('f-adr').value=p?p.adr:''; g('f-horaires').value=p?p.horaires:''; g('f-notes').value=p?p.notes:'';
  syncFormMode();
  document.getElementById('modalBg').classList.add('show');
}
function closeForm(){document.getElementById('modalBg').classList.remove('show')}
function savePartner(){
  const g=f=>document.getElementById(f).value.trim();
  const nom=g('f-nom');
  if(!nom){alert("Le nom est obligatoire.");return}
  const id=document.getElementById('f-id').value;
  const old=id?data.find(x=>x.id===id):null;
  const newId=id||uid();
  const obj={id:newId, sid:old?old.sid:('user-'+newId), fav:old?old.fav:false,
    domaine:document.getElementById('f-dom').value,
    nom, commune:document.getElementById('f-com').value, desc:g('f-desc'), public:g('f-public'),
    referent:g('f-referent'), tel:g('f-tel'), mail:g('f-mail'), site:g('f-site'),
    adr:g('f-adr'), horaires:g('f-horaires'), notes:g('f-notes')};
  if(id){const i=data.findIndex(x=>x.id===id); data[i]=obj;} else data.push(obj);
  persist(); closeForm(); render();
}
function delPartner(id){
  const p=data.find(x=>x.id===id);
  if(confirm(`Supprimer « ${p.nom} » ?`)){data=data.filter(x=>x.id!==id); persist(); render();}
}

/* ---------- Sauvegarde ---------- */
function exportData(){
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='reseau-aide-bruxelles-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
}
function importData(ev){
  const f=ev.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const x=JSON.parse(r.result); if(!Array.isArray(x)) throw 0;
      if(confirm("Remplacer votre liste actuelle par le fichier importé ?")){
        data=x.map(normalize); persist(); goHome();
      }
    }catch(e){alert("Fichier non valide.")}
    ev.target.value='';
  };
  r.readAsText(f);
}

document.getElementById('search').addEventListener('input', e=>{query=e.target.value; render()});
document.getElementById('f-dom').addEventListener('change', syncFormMode);
document.getElementById('modalBg').addEventListener('click', e=>{if(e.target.id==='modalBg') closeForm()});

render();
</script>
</body>
</html>
